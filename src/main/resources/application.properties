# ===============================
# SERVER CONFIG
# ===============================
server.port=8080
server.servlet.context-path=/api

# ===============================
# POSTGRESQL DATABASE CONFIG
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/finbud_hiring
spring.datasource.username=postgres
spring.datasource.password=aman1234
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# FILE UPLOAD CONFIG
# ===============================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Local storage fallback (IMPORTANT)
file.upload-dir=uploads/

# ===============================
# AWS S3 CONFIG (SAFE SETUP)
# ===============================
# Keep empty until AWS is activated
aws.accessKey=
aws.secretKey=
aws.region=ap-south-1
aws.s3.bucket=

# ===============================
# AWS SES (OPTIONAL - EMAIL)
# ===============================
aws.ses.from-email=your@gmail.com
aws.ses.hr-email=your@gmail.com

# ===============================
# LOGGING
# ===============================
logging.level.com.financebuddha.finbud=DEBUG